services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sabacc
      POSTGRES_USER: sabacc
      POSTGRES_PASSWORD: sabacc_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://sabacc:sabacc_dev@postgres:5432/sabacc?sslmode=disable
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
